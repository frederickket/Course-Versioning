# The absolute folder path to which all other path values in this configuration may be relative to.
# If unspecified, or if specified as null, then the value is automatically chosen to be the parent folder of your Code Analyzer
# configuration file if it exists, or the current working directory otherwise.
config_root: null # Last calculated by the config command as: "D:\\devs\\git_repos\\RIO-Education-V4"

# Folder where to store log files. May be an absolute path or a path relative to config_root.
# If unspecified, or if specified as null, then the value is automatically chosen to be your machine's default temporary directory.
log_folder: null # Last calculated by the config command as: "C:\\Users\\zhenyueh\\AppData\\Local\\Temp"

engines:
  regex:
    custom_rules:      
      AvoidExpensiveGetDescribe:
        regex: /\.getDescribe\s*\((?!\s*SObjectDescribeOptions\.DEFERRED\s*\))/gi
        file_extensions: [".cls", ".trigger"]
        description: "Use sObjectType.getDescribe(SObjectDescribeOptions.DEFERRED) to avoid excessive CPU usage."
        violation_message: "Use SObjectDescribeOptions.DEFERRED when calling getDescribe()"
        severity: Critical
        tags: ["CustomRules", "Performance", "Apex"]

      AvoidExpensiveDescribeSObjects:
        regex: /\.Schema.describeSObjects\s*\([^)]*(?!SObjectDescribeOptions\.DEFERRED)[^)]*\)/gi
        file_extensions: [".cls", ".trigger"]
        description: "Use Schema.describeSObjects(..., SObjectDescribeOptions.DEFERRED) to avoid excessive CPU usage."
        violation_message: "Use SObjectDescribeOptions.DEFERRED when calling Schema.describeSObjects()"
        severity: Critical
        tags: ["CustomRules", "Performance", "Apex"]
