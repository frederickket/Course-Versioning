<template>
    <lightning-modal-header label={headerLabel}></lightning-modal-header>
    <lightning-modal-body>
        <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess} onfail={handleLibLoadFail} ></c-js-library-loader>
        
        <div class="component-body slds-is-relative slds-card">
            <div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv" >
                <lightning-spinner alternative-text={loadingLabel} ></lightning-spinner>
            </div>
            
            <div class="ipepathwayhelpmodal-body">
                <div class="slds-p-bottom_small">
                    <div class="slds-text-heading_small" >{indicatorLabel}</div>
                    <lightning-layout class="slds-wrap" >
                        <lightning-layout-item size="12" padding="around-small" >
                            <lightning-icon icon-name="utility:lock" title={lockedLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{enrollmentLockedMsgLabel}</span>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" padding="around-small" >
                            <lightning-icon icon-name="utility:warning" variant="warning" title={missedFailedUnitMsgLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{missedFailedUnitMsgLabel}</span>
                        </lightning-layout-item>
                    </lightning-layout>
                </div>
                <div class="slds-p-bottom_small">
                    <div class="slds-text-heading_small" >{actionLabel}</div>
                    <lightning-layout class="slds-wrap" >
                        <lightning-layout-item size="12" padding="around-small" >
                            <lightning-icon icon-name={preEnrollButtonIconName} title={preEnrollButtonLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{preEnrollButtonLabel}</span>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" padding="around-small">
                            <lightning-icon icon-name={withdrawPreEnrollButtonIconName} title={withdrawPreEnrollButtonLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{withdrawPreEnrollButtonLabel}</span>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" padding="around-small">
                            <lightning-icon icon-name={enrollButtonIconName} title={enrollButtonLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{enrollButtonLabel}</span>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" padding="around-small">
                            <lightning-icon icon-name={unenrollButtonIconName} title={unenrollButtonLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{unenrollButtonLabel}</span>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" padding="around-small">
                            <lightning-icon icon-name={unenrollRequestButtonIconName} title={unenrollRequestButtonLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{unenrollRequestButtonLabel}</span>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" padding="around-small">
                            <lightning-icon icon-name={waitlistButtonIconName} title={waitlistButtonLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{waitlistButtonLabel}</span>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" padding="around-small">
                            <lightning-icon icon-name={withdrawWaitlistButtonIconName} title={withdrawWaitlistButtonLabel} size="small" class="slds-p-right_x-small" ></lightning-icon>
                            <span>{withdrawWaitlistButtonLabel}</span>
                        </lightning-layout-item>
                    </lightning-layout>
                </div>
            </div>
        </div>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button variant="neutral" onclick={handleCloseClick} label={closeButtonLabel}></lightning-button>
    </lightning-modal-footer>
	
</template>
