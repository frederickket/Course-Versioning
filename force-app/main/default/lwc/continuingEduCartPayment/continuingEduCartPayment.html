<template>
    <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess} onfail={handleLibLoadFail} ></c-js-library-loader>
	
    <div class="component-body slds-is-relative slds-card">

        <div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv">
            <lightning-spinner alternative-text={label.LOADING_LABEL}></lightning-spinner>
        </div>
        <template if:true={isInitSuccess}>
            <div class="slds-m-around_medium">
                <template if:true={showModalHeader}>
                    <div class="continuingeducart-header slds-m-bottom_medium slds-p-bottom_medium slds-border_bottom">
                        <lightning-layout class="slds-wrap">
                            <lightning-layout-item size="12" large-device-size="4">
                                <div class="continuingeducart-title slds-card__header-title">
                                    <lightning-icon icon-name={modalIconName} size={iconSize} class="slds-m-right_xx-small"></lightning-icon>
                                    <lightning-formatted-text value={titleLabel}></lightning-formatted-text>
                                </div>
                            </lightning-layout-item>
                        </lightning-layout>
                    </div>
                </template>
                <div class="continuingeducartpayment-container">                    
                    <!--start of visual picker-->
                    <fieldset class="slds-form-element slds-p-bottom_medium">
                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                            <h2 class="continuingeducartpayment-descriptionLabel">
                                <p>{descriptionText}</p>
                            </h2>
                        </div>
                        <div class="continuingeducartpayment-visualpicker slds-form-element__control slds-grid slds-wrap slds-gutters slds-grid slds-grid_align-center slds-grid_vertical-stretch">
                            <div if:true={creditCardLabel} class="slds-visual-picker slds-visual-picker_medium">
                                <input type="radio" id="type-credit" value="type-credit" name="payment-radio" onchange={handlePaymentType}></input>
                                <label for="type-credit">
                                    <span class="slds-visual-picker__figure slds-visual-picker__text slds-align_absolute-center">
                                        <span>
                                            <span class="slds-text-heading_large">{creditCardLabel}</span>
                                            <span class="slds-text-title">{creditCardDescription}</span>
                                        </span>
                                    </span>
                                    <span class="slds-icon_container slds-visual-picker__text-check" aria-hidden="true">
                                        <template lwc:if={creditselect}>
                                            <lightning-icon class="continuingeducartpayment-checkIcon slds-icon-text-check" icon-name="utility:check" size="x-small"></lightning-icon>
                                        </template>
                                    </span>
                                </label>
                            </div>
                            <div if:true={companyLabel} class="slds-visual-picker slds-visual-picker_medium">
                                <input type="radio" id="type-company" value="type-company" name="payment-radio" onchange={handlePaymentType}></input>
                                <label for="type-company">
                                    <span class="slds-visual-picker__figure slds-visual-picker__text slds-align_absolute-center">
                                        <span>
                                            <span class="slds-text-heading_large">{companyLabel}</span>
                                            <span class="slds-text-title">{companyDescription}</span>
                                        </span>
                                    </span>
                                    <span class="slds-icon_container slds-visual-picker__text-check" aria-hidden="true">
                                        <template lwc:if={creditCompany}>
                                            <lightning-icon class="continuingeducartpayment-checkIcon slds-icon-text-check" icon-name="utility:check" size="x-small"></lightning-icon>
                                        </template>
                                    </span>
                                </label>
                            </div>
                        </div>
                    </fieldset>
                    <!--end of visual picker-->
            
                    <lightning-layout class="continuingeducart-buttoncontainer slds-grid_reverse">
                        <lightning-layout-item>
                            <lightning-button if:true={cancelButtonLabel} variant="neutral" label={cancelButtonLabel} title={cancelButtonLabel} onclick={handleCancelHandler} class="slds-m-right_xx-small"></lightning-button>
                            <lightning-button if:true={payButtonLabel} variant="brand" label={payButtonLabel} title={payButtonLabel} onclick={handlePayHandler}></lightning-button>
                        </lightning-layout-item>
                    </lightning-layout>
                    
                </div>
            </div>
        </template>
    </div>
</template>
