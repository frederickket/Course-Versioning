<template>
    <lightning-modal-header label={modalTitle}></lightning-modal-header>
    <lightning-modal-body>
        <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess}
            onfail={handleLibLoadFail}></c-js-library-loader>

        <div class="component-body slds-is-relative">
            <div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv">
                <lightning-spinner alternative-text={label.LOADING_LABEL}></lightning-spinner>
            </div>

            <template if:true={isInitSuccess}>
                <div class="studySessionSchedulerEventInfo-content slds-m-bottom_medium">
                    <div class="studySessionSchedulerEventInfo-studyEvent">
                        <c-record-view-form
                        object-api-name="reduivy__Study_Event__c"
                        record-id={studyEvent.Id}
                        fields={eventInfoFieldsList}
                        enable-debug-mode={enableDebugMode}
                        >


                        <lightning-layout multiple-rows="true">
                            <template for:each={eventInfoFieldsList} for:item='field'>
                                <lightning-layout-item size="12" large-device-size="6" key={field}>
                                    <c-output-field field-name={field}></c-output-field>
                                </lightning-layout-item>
                            </template>
                        </lightning-layout>
                        
                        </c-record-view-form>
                    </div>

                    <template lwc:if={facilityDatatableData.data.length}>
                        <div class="studySessionSchedulerEventInfo-facility slds-m-bottom_medium">
                            <c-custom-type-datatable
                            data={facilityDatatableData.data}
                            columns={facilityDatatableData.columns}
                            key-field="Id"
                            wrap-table-header={tableHeaderDisplayMode}
                            hide-checkbox-column="true"
                            ></c-custom-type-datatable>
                        </div>
                    </template>
                    
                    <template lwc:if={facultyDatatableData.data.length}>
                        <div class="studySessionSchedulerEventInfo-faculty">
                            <c-custom-type-datatable
                            data={facultyDatatableData.data}
                            columns={facultyDatatableData.columns}
                            key-field="Id"
                            wrap-table-header={tableHeaderDisplayMode}
                            hide-checkbox-column="true"
                            ></c-custom-type-datatable>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button variant="neutral" disabled={isLoading} onclick={handleClose} label={closeButtonLabel} class="slds-p-right_xx-small"></lightning-button>

        <template lwc:if={showUnallocatedButton} >
            <lightning-button variant="brand" disabled={isLoading} onclick={handleUnallocateBooking} label={unallocateButtonLabel} class="slds-p-right_xx-small"></lightning-button>
        </template>
    </lightning-modal-footer>

</template>
