<template>
    <lightning-modal-header label={headerLabel}></lightning-modal-header>
    <lightning-modal-body>
        <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess} onfail={handleLibLoadFail} ></c-js-library-loader>

        <div class="component-body slds-is-relative slds-card">
            <div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv" >
                <lightning-spinner alternative-text={loadingLabel}></lightning-spinner>
            </div>
                
            <c-study-pathway if:true={masterIpeStudyPathwayId}
                record-id={masterIpeStudyPathwayId}
                study-pathway-info-fields={studyPathwayInfoFields}
                study-pathway-term-title-prefix={studyPathwayTermTitlePrefix}
                study-pathway-term-info-fields={studyPathwayTermInfoFields}
                study-pathway-unit-title-field={studyPathwayUnitTitleField}
                study-pathway-unit-info-fields={studyPathwayUnitInfoFields}
                study-pathway-unit-icon={studyPathwayUnitIcon}
                study-pathway-group-title-field={studyPathwayGroupTitleField}
                study-pathway-group-info-fields={studyPathwayGroupInfoFields}
                study-pathway-group-icon={studyPathwayGroupIcon}
                show-study-plan-options={studyPathwayShowStudyPlanOptions}
                accordion-background-color={studyPathwayAccordionBackgroundColor}
                accordion-text-color={studyPathwayAccordionTextColor}
                combobox-label={studyPathwayComboboxLabel}
                current-term-number={currentTermNumber}
                show-study-unit-quick-search={studyPathwayShowStudyUnitQuickSearch}
                preselected-spo={preselectedSpo}
                enable-debug-mode={enableDebugMode}>
            </c-study-pathway>

        </div>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button variant="neutral" onclick={handleCloseClick} label={closeButtonLabel} class={closeButtonCssClass}></lightning-button>
        <lightning-button lwc:if={showChangeStudyPathwayButton} variant="brand" onclick={handleChangePathwayClick} label={changePathwayButtonLabel} ></lightning-button>
    </lightning-modal-footer>
</template>
