<template>
    <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess} onfail={handleLibLoadFail} ></c-js-library-loader>
	
    <div class="component-body slds-is-relative slds-card">
        <div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv" >
            <lightning-spinner alternative-text={label.LOADING_LABEL} ></lightning-spinner>
        </div>
        <lightning-quick-action-panel header={confirmationTitle}>
            <div class="jqhcanceljob-body">
                <div class="jqhcanceljob-confirmation-text">
                    {confirmationText}
                </div>
                <div class="jqhcanceljob-option">
                    <div class="slds-grid slds-p-top_small">
                        <div class="slds-col slds-size_1-of-4">
                            <lightning-combobox 
                                name="retrycombobox"
                                label={retryFieldLabel}
                                options={retryOptions}
                                value={selectedRetryOption}
                                onchange={handleRetryComboboxChange}
                                required="true"
                            ></lightning-combobox>
                        </div>
                    </div>
                </div>
            </div>
            <div slot="footer">
                <lightning-button variant="neutral" label={label.CANCEL_LABEL} onclick={handleCancelClick} class="slds-p-right_xx-small" disabled={isLoading}></lightning-button>
                <lightning-button variant="brand" label={label.CONFIRM_LABEL} onclick={handleConfirmClick} disabled={isLoading}></lightning-button>
            </div>
        </lightning-quick-action-panel>
    </div>
	
</template>
