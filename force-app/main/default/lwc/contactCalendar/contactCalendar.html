<template>
    <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess} onfail={handleLibLoadFail} ></c-js-library-loader>
    
    <div class="component-body slds-is-relative">
        <div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv" >
            <lightning-spinner alternative-text={label.loading}></lightning-spinner>
        </div>

        <div class="contactcalendar-header slds-m-bottom_medium slds-p-bottom_medium slds-border_bottom">
            <lightning-layout class="slds-wrap">

                <lightning-layout-item size="12" large-device-size="4">
                    <template if:true={showModalHeader}>
                        <div class="contactcalendar-title slds-card__header-title">
                            <lightning-icon icon-name={modalIconName} size="medium" class="slds-m-right_xx-small"></lightning-icon>
                            <lightning-formatted-text value={modalTitle}></lightning-formatted-text>
                        </div>
                    </template>
                </lightning-layout-item>

                <lightning-layout-item alignment-bump="left">
                    <div class="contactcalendar-nav-button-group">
                        <lightning-button-group>
                            <lightning-button-icon title={label.REFRESH_LABEL} icon-name="utility:refresh" value="refresh" onclick={handleRefreshOnclick}></lightning-button-icon>
                        </lightning-button-group>
                    </div>
                </lightning-layout-item>
                
            </lightning-layout>
        </div>

        <div class="contactcalendar-body">
            <div data-id="calendar" id="calendardiv"></div>
        </div>
    </div>
</template>
