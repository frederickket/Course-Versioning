<template>
    <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess} onfail={handleLibLoadFail} ></c-js-library-loader>
    
    <div class="component-body slds-is-relative slds-card">
        
        <div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv" >
            <lightning-spinner alternative-text={label.LOADING_LABEL}></lightning-spinner>
        </div>
        
        <template if:true={isInitSuccess}>
            <div class="slds-m-around_medium">
                <div class="ipeaudit-header slds-m-bottom_medium slds-p-bottom_medium slds-border_bottom">
                    <lightning-layout class="slds-wrap">
                        <lightning-layout-item size="12" large-device-size="4">
                            <template if:true={showModalHeader}>
                                <div class="ipeaudit-title slds-card__header-title">
                                    <lightning-icon icon-name={modalIconName} size="medium" class="slds-m-right_xx-small"></lightning-icon>
                                    <lightning-formatted-text value={modalTitle}></lightning-formatted-text>
                                </div>
                            </template>
                        </lightning-layout-item>
                        <lightning-layout-item alignment-bump="left">
                            <div class="ipeaudit-nav-button-group">
                                <lightning-button-group>
                                    <lightning-button-icon title={label.REFRESH_LABEL} icon-name="utility:refresh" value="refresh" onclick={handleRefreshOnclick}></lightning-button-icon>
                                </lightning-button-group>
                            </div>
                        </lightning-layout-item>
                    </lightning-layout>
                </div>
                <div class="ipeaudit-content">
                    <lightning-tabset variant={tabVariant} class="ipeaudit-tabset">
                        <template for:each={individualPEList} for:item="currentPE">
                            <lightning-tab label={currentPE.Title} key={currentPE.Id} class="ipeaudit-tab">
                                <c-ipe-audit-program-enrollment
                                    ipe-id = {currentPE.Id}
                                    ipf-id = {currentPE.ipfId}
                                    ips-group-title-field = {ipsGroupTitleField}
                                    ips-group-title-format = {ipsGroupTitleFormat}
                                    show-ips-group-info = {showIpsGroupInfo}
                                    ipf-info-fields = {ipfInfoFields}
                                    ipf-info-column-no = {ipfInfoColumnNo}
                                    ipe-info-fields = {ipeInfoFields}
                                    ipe-info-column-no = {ipeInfoColumnNo}
                                    ips-info-fields = {ipsInfoFields}
                                    ips-info-fields-unit = {ipsInfoFieldsUnit}
                                    ips-info-column-no = {ipsInfoColumnNo}
                                    ips-unit-fields = {ipsUnitFields}
                                    idv-enrollment-fields = {idvEnrollmentFields}
                                    accordion-background-color = {accordionBackgroundColor}
                                    accordion-text-color = {accordionTextColor}
                                    enable-clickable-ref-field = {enableClickableRefField}
                                    enable-set-primary-ips = {enableSetPrimaryIps}
                                    enable-view-enrollment-history = {enableViewEnrollmentHistory}
                                    progress-ring-color = {progressRingColor}
                                    progress-ring-percentage-field = {progressRingPercentageField}
                                    href-target-type = {hrefTargetType}
                                    table-text-display-mode = {tableTextDisplayMode}
                                    is-community = {isCommunity}
                                    enable-debug-mode = {enableDebugMode}
                                ></c-ipe-audit-program-enrollment>
                            </lightning-tab>
                        </template>
                    </lightning-tabset>
                </div>
            </div>
        </template>
    </div>
</template>
