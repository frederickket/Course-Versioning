<template>
    <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess} onfail={handleLibLoadFail} ></c-js-library-loader>
	
	<div class="component-body slds-is-relative slds-card">
		<div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv" >
            <lightning-spinner alternative-text={label.LOADING_LABEL} ></lightning-spinner>
        </div>
		
        <template if:true={isInitSuccess}>
            <div class="slds-m-around_medium">
                <div class="studyplanhierarchy-header slds-m-bottom_medium slds-p-bottom_medium slds-border_bottom">
                    <lightning-layout class="slds-wrap">
                        <lightning-layout-item size="12" large-device-size="4">
                            <template if:true={showModalHeader}>
                                <div class="studyplanhierarchy-title slds-card__header-title">
                                    <lightning-icon icon-name={modalIconName} size="medium" class="slds-m-right_xx-small"></lightning-icon>
                                    <lightning-formatted-text value={modalTitle}></lightning-formatted-text>
                                </div>
                            </template>
                        </lightning-layout-item>
                        <lightning-layout-item alignment-bump="left">
                            <div class="studyplanhierarchy-nav-button-group">
                                <template if:false={isModeView}>
                                    <lightning-button-group>
                                        <lightning-button-icon title={newGroupLabel} icon-name="utility:add" value="add" onclick={handleNewTopGroupButtonClick}></lightning-button-icon>
                                    </lightning-button-group>
                                </template>
                                <lightning-button-group>
                                    <lightning-button-icon title={label.REFRESH_LABEL} icon-name="utility:refresh" value="refresh" onclick={handleRefreshOnclick}></lightning-button-icon>
                                </lightning-button-group>
                            </div>
                        </lightning-layout-item>
                    </lightning-layout>
                </div>
                <div if:true={isDataReady} class="studyplanhierarchy-content">
                    <template if:true={showSplInfo}>
                        <div>
                            <c-record-view-form 
                                record-id={recordId}
                                object-api-name="reduivy__Study_Plan__c"
                                fields={infoFields}
                                enable-debug-mode={enableDebugMode}
                            >
                                <lightning-layout class="slds-wrap">
                                    <template for:each={infoFields} for:item="field">
                                        <lightning-layout-item key={field} size="12" large-device-size={infoFieldSize} >
                                            <c-output-field field-name={field} ></c-output-field>
                                        </lightning-layout-item>
                                    </template>
                                </lightning-layout>
                            </c-record-view-form>
                        </div>
                    </template>
                    <template for:each={topGroups} for:item="sps">
                        <c-study-plan-group key={sps.Id}
                            sps-id={sps.Id}
                            level={nextLevel}
                            sps-record-type-info={spsRecordTypeInfoResponse}
                            show-sps-group-info={showSpsGroupInfo}
                            sps-group-title-field={spsGroupTitleField}
                            sps-group-info-fields={spsGroupInfoFields}
                            sps-group-info-column-no={spsGroupInfoColumnNo}
                            group-modal-fields={groupFields}
                            unit-modal-fields={unitFields}
                            accordion-background-color={accordionBackgroundColor}
                            accordion-text-color={accordionTextColor}
                            sps-unit-table-fields={spsUnitTableFields}
                            enable-clickable-ref-field={enableClickableRefField}
                            href-target-type={hrefTargetType}
                            is-community={isCommunity}
                            is-mode-view={isModeView}
                            table-text-display-mode={tableTextDisplayMode}
                            enable-debug-mode={enableDebugMode}
                            
                            onselection={handleButtonEvent}
                        ></c-study-plan-group>
                    </template>
                </div>
            </div>
        </template>
	</div>
	
</template>
