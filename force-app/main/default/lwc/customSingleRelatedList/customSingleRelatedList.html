<template>
    <c-js-library-loader modules={modules} enable-debug-mode={enableDebugMode} onsuccess={handleLibLoadSuccess} onfail={handleLibLoadFail} ></c-js-library-loader>
	
	<div class="component-body slds-is-relative slds-card">
		<div if:true={isLoading} id="spinnerDiv" data-id="spinnerDiv" >
            <lightning-spinner alternative-text={label.LOADING_LABEL} ></lightning-spinner>
        </div>
		
        <template if:true={isInitSuccess}>

            <template if:true={isRelatedList}>
                <div slot="title" class="customsinglerelatedlist-header slds-p-around_medium slds-theme_shade slds-border_bottom">
                    <lightning-layout class="slds-wrap">
                        <lightning-layout-item size="12" large-device-size="4">
                            <div class="customsinglerelatedlist-title slds-card__header-title">
                                <lightning-icon if:true={modalIconName} icon-name={modalIconName} size="medium" class="slds-m-right_xx-small"></lightning-icon>
                                <b><a class="slds-card__header-link">{modalTitle}</a></b>
                            </div>
                        </lightning-layout-item>
                        <template if:true={enableQuickSearch}>
                            <lightning-layout-item alignment-bump={quickSearchBump}>    
                                <lightning-input type="search" variant="label-hidden" value={quickSearchKeywords} class="slds-m-right_xx-small" onchange={handleQuickSearch} placeholder={label.QUICK_SEARCH_LABEL}></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <lightning-layout-item alignment-bump={buttonsBump}>

                            <div class="customsinglerelatedlist-nav-button-group">
                                <lightning-button-group>
                                    <lightning-button-icon if:true={showRefreshButton} variant="border-filled" title={label.REFRESH_LABEL} icon-name="utility:refresh" value="refresh" onclick={handleRefreshOnclick}></lightning-button-icon>
                                    <lightning-button lwc:if={enableNewButton} variant='neutral' label={newLabel} title={newLabel} onclick={handleNewRecord}></lightning-button>
                                </lightning-button-group>
                            </div>
                        </lightning-layout-item>
                    </lightning-layout>
                    <div class="customsinglerelatedlist-count">{selectedItemsLabel}</div>
                </div>
            </template>
            <template if:false={isLoading}>
                <div class="customsinglerelatedlist-content">
                    <c-custom-type-datatable
                        columns={datatableColumns}
                        data={filteredData}
                        key-field="Id"
                        show-row-number-column={showRowNumber}
                        onrowaction={handleRowAction}
                        hide-checkbox-column={hideCheckbox}
                        enable-infinite-loading={infiniteLoading}
                        load-more-offset={loadMoreOffset}
                        onloadmore={handleLoadMoreData}
                        sorted-by={datatableSortedby}
                        sorted-direction={datatableSortedDirection}
                        onsort={handleOnSort}
                        draft-values={draftValues}
                        wrap-table-header={tableHeaderDisplayMode}
                        onsave={handleInlineSave}
                        selected-rows={selectedRowsId}
                        onrowselection={handleRowsSelected}
                    ></c-custom-type-datatable>
                    <template if:true={datatableDataIsEmpty}>
                        <template if:true={hasQueried}>
                            <div class="slds-m-around_x-small">
                                {noRecordFoundMessage}
                            </div>
                        </template>
                    </template>
                </div>
            </template>
            
        </template>
	</div>
	
</template>
