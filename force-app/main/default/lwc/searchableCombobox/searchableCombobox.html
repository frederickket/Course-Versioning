<template>
    <div class={searchableComboboxClasses}>
        <div>
            <template if:true={fieldLabel}>
                <label class="searchablecombobox-label slds-form-element__label">
                    <template if:true={required}>
                        <abbr class="slds-required" title={label.REQUIRED_LABEL}>* </abbr>
                    </template>
                    {fieldLabel}
                </label>
                <template if:true={helpText}>
                    <lightning-helptext content={helpText}></lightning-helptext>
                </template>
            </template>
            <div lwc:ref="combobodydiv" class="searchablecombobox-body slds-form-element__control" data-name={fieldName}>
                <div class={comboContainerClasses}>
                    <div class="slds-combobox_container">
                        <div class={comboDivClasses}>
                            <div class={selectedValueIconCss}>
                                <template lwc:if={selectedValue}>
                                    <template if:true={selectedValueIconName}>
                                        <span class="slds-icon_container slds-combobox__input-entity-icon">
                                            <lightning-icon size="x-small" icon-name={selectedValueIconName}></lightning-icon>
                                        </span>
                                    </template>
                                    <div role="combobox" tabindex="0" class="searchablecombobox-selectedvalue slds-input_faux slds-combobox__input slds-combobox__input-value">
                                        <span class="slds-truncate">{selectedValueLabel}</span>
                                    </div>
                                    <button class="slds-button slds-button_icon slds-input__icon slds-input__icon_right" title={label.CLEAR_LABEL} onclick={handleClearInput}>
                                        <lightning-icon title={label.CLEAR_LABEL} size="x-small" icon-name="utility:clear"></lightning-icon>
                                    </button>
                                </template>
                                <template lwc:else>
                                    <input
                                        name="searchinput"
                                        required={required}
                                        type="text"
                                        class={searchInputClasses}
                                        onkeyup={handleChange}
                                        onfocus={handleFocus}
                                        onblur={handleBlur}
                                        onkeydown={handleKeyDown}
                                        oninput={handleInput}
                                        autocomplete="off"
                                    />
                                    <lightning-icon title={label.SEARCH_LABEL} size="x-small" class="slds-icon slds-input__icon slds-input__icon_right slds-icon-text-default" icon-name="utility:search"></lightning-icon>
                                </template>
                            </div>
                            <template if:true={filteredOptions.length}>
                                <div lwc:ref="combodropdowndiv" class="searchablecombobox-dropdown slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid slds-dropdown_left slds-listbox slds-listbox_vertical" role="listbox" onmousedown={handleDropdownMouseDown} onmouseup={handleDropdownMouseUp} onmouseleave={handleDropdownMouseLeave}>
                                    <template for:each={filteredOptions} for:item="option">
                                            <div key={option.value} data-value={option.value} data-label={option.label} class={option.classes} role="option" onclick={handleSelect} data-focused={option.focused}>
                                                <span class="slds-media__figure slds-listbox__option-icon">
                                                    <template lwc:if={option.iconName}>
                                                        <lightning-icon size="small" icon-name={option.iconName}></lightning-icon>
                                                    </template>
                                                    <template lwc:elseif={iconName}>
                                                        <lightning-icon size="small" icon-name={iconName}></lightning-icon>
                                                    </template>
                                                </span>
                                                <span class="slds-media__body">
                                                    <span class="slds-listbox__option-text slds-listbox__option-text_entity" title={option.label}>{option.label}</span>
                                                    <template if:true={option.metaInfoStr}>
                                                        <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">{option.metaInfoStr}</span>
                                                    </template>
                                                </span>
                                            </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
            <template if:true={isInvalid}>
                <div class="searchablecombobox-error slds-form-element__help" >{messageWhenValueMissing}</div>
            </template>
        </div>
    </div>
</template>
